#
# Base application config committed to the repository.
# Example local overrides should be kept in application-local.example.properties.
# Real developer overrides should go to application-local.properties
# and be used with the "local" Spring profile.
#
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
